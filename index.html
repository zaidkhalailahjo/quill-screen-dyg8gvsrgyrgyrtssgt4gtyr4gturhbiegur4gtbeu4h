<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري العمل على النظام</title>
    <style>
        :root {
            --primary-color: #00839b;
            --secondary-color: #002d74;
            --bg-gradient: linear-gradient(135deg, #002d74 0%, #00839b 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            overflow: hidden;
            color: white;
        }

        .container {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 90%;
        }

        /* أنميشن الشخص الذي يركض */
        .loader-wrapper {
            position: relative;
            height: 100px;
            margin-bottom: 30px;
        }

        .runner {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .runner div {
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            animation: run 0.8s infinite ease-in-out;
        }

        /* تمثيل بسيط لجسم يتحرك */
        .runner .head { top: -25px; left: 0; }
        .runner .body { top: 0; left: 0; height: 35px; border-radius: 10px; }
        
        @keyframes run {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* نيون بار Progress */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            width: 50%;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            border-radius: 10px;
            animation: loading 2s infinite ease-in-out;
        }

        @keyframes loading {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        p {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        /* إضافة لمسة جمالية للخلفية */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            z-index: -1;
        }
    </style>
</head>
<body>

    <!-- عناصر خلفية للزينة -->
    <div class="circle" style="width: 300px; height: 300px; top: -100px; right: -50px;"></div>
    <div class="circle" style="width: 200px; height: 200px; bottom: -50px; left: -30px;"></div>

    <div class="container">
        <div class="loader-wrapper">
            <!-- شكل رمز تعبيري أو SVG بسيط كشخص يتحرك -->
            <div style="font-size: 50px; animation: run 0.6s infinite alternate;">🏃‍♂️</div>
        </div>
        
        <h1>جاري العمل على النظام</h1>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p>نحن نقوم بتحسين تجربتك، سنكون جاهزين قريباً.</p>
    </div>

</body>
</html>
