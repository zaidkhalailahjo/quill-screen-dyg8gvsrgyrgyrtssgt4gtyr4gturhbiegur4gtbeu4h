<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق الإرسال Quill</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#070C10">
</head>
<body>
    <div id="app">
        <!-- شريط الروبوتات -->
        <header class="header">
            <div class="robots-info">
                <span class="icon">🤖</span>
                <div class="text">
                    <div class="label">الروبوتات المحددة</div>
                    <div id="selectedRobotsText" class="value">جاري البحث...</div>
                </div>
            </div>
            <button id="refreshScreensBtn" class="icon-btn">🔄</button>
        </header>

        <!-- منطقة المعاينة وتعديل الأبعاد -->
        <div class="preview-area" id="previewArea">
            <div id="mediaBox" class="media-box" style="display: none;">
                <img id="imagePreview" style="display: none;" draggable="false" />
                <video id="videoPreview" loop muted style="display: none;"></video>
                <div id="urlPreview" style="display: none;" class="url-placeholder">🌐<br>رابط ويب</div>
                <div class="resize-handle" id="resizeHandle"></div>
            </div>
            <div id="emptyPreview" class="empty-preview">
                لا توجد وسائط محددة
            </div>
        </div>

        <!-- مدة العرض -->
        <div class="duration-control">
            <div class="duration-header">
                <span>مدة العرض:</span>
                <span id="durationLabel" class="duration-value">15s</span>
            </div>
            <input type="range" id="durationSlider" min="1" max="60" value="15">
        </div>

        <!-- أزرار التحكم بالقائمة -->
        <div class="controls-bar">
            <button id="addMediaBtn" class="add-btn">➕</button>
            <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;" multiple>
            <button id="addUrlDialogBtn" class="add-btn">🌐</button>
            <button id="sendBtn" class="send-btn">إرسال للشاشة 🚀</button>
        </div>

        <!-- قائمة الوسائط المحددة -->
        <div class="media-list" id="mediaList">
            <!-- سيتم إضافة العناصر هنا عبر الجافاسكريبت -->
        </div>

        <!-- طبقة التحميل -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loader"></div>
            <div id="loadingText">جاري المعالجة...</div>
        </div>
        
        <!-- نافذة إضافة رابط -->
        <div id="urlModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>إضافة رابط ويب</h3>
                <input type="url" id="urlInput" placeholder="https://..." dir="ltr">
                <div class="modal-actions">
                    <button id="cancelUrlBtn" class="btn-secondary">إلغاء</button>
                    <button id="addUrlBtn" class="btn-primary">إضافة</button>
                </div>
            </div>
        </div>
    </div>

    <!-- مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
