<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quill DS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#070C10">
    <link rel="icon" href="https://uploads.onecompiler.io/44krdug5q/1781421056101/Quillbot.jpg">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #070C10;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background-color: #0a1014;
            position: relative;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #111A22;
            border-bottom: 1px solid #1F2A35;
        }
        .robots-info { display: flex; align-items: center; gap: 12px; }
        .icon { font-size: 24px; display: flex; align-items: center; color:#00A878; }
        .label { font-size: 12px; color: #8899A6; }
        .value { font-size: 15px; font-weight: bold; }
        .icon-btn {
            background: none; border: none; font-size: 20px; color: white; cursor: pointer;
            padding: 8px; border-radius: 50%; background-color: #1F2A35;
            display: flex; align-items: center; justify-content: center;
        }

        /* Preview Area */
        .preview-area {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .media-box {
            position: absolute;
            border: 2px solid #00A878;
            box-shadow: 0 0 10px rgba(0, 168, 120, 0.5);
            left: 0; top: 0; width: 100%; height: 100%;
            touch-action: none;
        }
        .media-box img, .media-box video {
            width: 100%; height: 100%; object-fit: cover; pointer-events: none;
        }
        .url-placeholder {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background-color: #1a2630; color: #8899A6; font-size: 14px; text-align: center;
        }
        .resize-handle {
            position: absolute;
            bottom: 0; right: 0;
            width: 30px; height: 30px;
            background: linear-gradient(135deg, transparent 50%, #00A878 50%);
            cursor: se-resize;
        }
        .empty-preview {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            color: #8899A6; font-size: 14px;
        }

        /* Controls */
        .controls-bar {
            display: flex; gap: 10px; padding: 0 20px 15px;
        }
        .add-btn {
            background-color: #1F2A35; color: white; border: none;
            border-radius: 12px; padding: 12px 20px; font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .send-btn {
            flex: 1; background-color: #00A878; color: white; border: none;
            border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* Duration */
        .duration-control {
            padding: 0 20px 15px;
        }
        .duration-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #8899A6;}
        .duration-value { color: white; font-weight: bold; }
        input[type=range] { width: 100%; accent-color: #00A878; }

        /* Media List */
        .media-list {
            flex: 1; overflow-y: auto; padding: 0 20px 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .media-item {
            display: flex; align-items: center; gap: 12px; padding: 10px;
            background-color: #111A22; border-radius: 12px; border: 1px solid #1F2A35; cursor: pointer;
        }
        .media-item.active { border-color: #00A878; background-color: rgba(0, 168, 120, 0.1); }
        .media-thumb {
            width: 60px; height: 60px; border-radius: 8px; background-color: #000;
            display: flex; align-items: center; justify-content: center; overflow: hidden; color: #8899A6;
        }
        .media-thumb img, .media-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .media-info { flex: 1; }
        .media-name { font-size: 14px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px;}
        .media-type { font-size: 12px; color: #8899A6; }
        .media-actions button {
            background: none; border: none; color: white; padding: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .delete-btn { color: #E74C3C !important; }

        /* Modal & Loader */
        .loading-overlay {
            position: absolute; inset: 0; background-color: rgba(7, 12, 16, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; z-index: 100;
        }
        .loader { border: 4px solid #1F2A35; border-top: 4px solid #00A878; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .modal {
            position: absolute; inset: 0; background-color: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 50;
        }
        .modal-content {
            background-color: #111A22; padding: 20px; border-radius: 16px; width: 90%; max-width: 320px;
        }
        .modal-content.text-center { text-align: center; }
        .install-icon { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .modal-content h3 { margin-bottom: 15px; font-size: 18px; }
        .modal-content input {
            width: 100%; padding: 12px; background-color: #0a1014; border: 1px solid #1F2A35; color: white; border-radius: 8px; margin-bottom: 20px;
        }
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-secondary { background-color: #1F2A35; color: white; }
        .btn-primary { background-color: #00A878; color: white; }
    </style>
</head>
<body>
    <div id="app">
        <!-- شريط الروبوتات -->
        <header class="header">
            <div class="robots-info">
                <span class="icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                </span>
                <div class="text">
                    <div class="label">الروبوتات المحددة</div>
                    <div id="selectedRobotsText" class="value">جاري البحث...</div>
                </div>
            </div>
            <button id="refreshScreensBtn" class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-10.09l5.67-5.67"/></svg>
            </button>
        </header>

        <!-- منطقة المعاينة وتعديل الأبعاد -->
        <div class="preview-area" id="previewArea">
            <div id="mediaBox" class="media-box" style="display: none;">
                <img id="imagePreview" style="display: none;" draggable="false" />
                <video id="videoPreview" loop muted style="display: none;"></video>
                <div id="urlPreview" style="display: none;" class="url-placeholder">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px;"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    رابط ويب
                </div>
                <div class="resize-handle" id="resizeHandle"></div>
            </div>
            <div id="emptyPreview" class="empty-preview">
                لا توجد وسائط محددة
            </div>
        </div>

        <!-- مدة العرض -->
        <div class="duration-control">
            <div class="duration-header">
                <span>مدة العرض:</span>
                <span id="durationLabel" class="duration-value">15s</span>
            </div>
            <input type="range" id="durationSlider" min="1" max="60" value="15">
        </div>

        <!-- أزرار التحكم بالقائمة -->
        <div class="controls-bar">
            <button id="addMediaBtn" class="add-btn" title="إضافة وسائط">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;" multiple>
            <button id="addUrlDialogBtn" class="add-btn" title="إضافة رابط">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            </button>
            <button id="sendBtn" class="send-btn">
                إرسال للشاشة
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px; vertical-align:middle;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>

        <!-- قائمة الوسائط المحددة -->
        <div class="media-list" id="mediaList">
            <!-- سيتم إضافة العناصر هنا عبر الجافاسكريبت -->
        </div>

        <!-- طبقة التحميل -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loader"></div>
            <div id="loadingText">جاري المعالجة...</div>
        </div>
        
        <!-- نافذة إضافة رابط -->
        <div id="urlModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>إضافة رابط ويب</h3>
                <input type="url" id="urlInput" placeholder="https://..." dir="ltr">
                <div class="modal-actions">
                    <button id="cancelUrlBtn" class="btn-secondary">إلغاء</button>
                    <button id="addUrlBtn" class="btn-primary">إضافة</button>
                </div>
            </div>
        </div>

        <!-- نافذة تثبيت التطبيق -->
        <div id="installModal" class="modal" style="display: none;">
            <div class="modal-content text-center">
                <img src="https://uploads.onecompiler.io/44krdug5q/1781421056101/Quillbot.jpg" alt="Icon" class="install-icon">
                <h3 id="installTitle">تثبيت التطبيق</h3>
                <p id="installMessage" style="margin-bottom:20px; line-height:1.6; color:#8899A6;">قم بتثبيت التطبيق على جهازك للوصول السريع وتجربة أفضل.</p>
                <div class="modal-actions">
                    <button id="closeInstallBtn" class="btn-secondary">لاحقاً</button>
                    <button id="installAppBtn" class="btn-primary">تثبيت الآن</button>
                </div>
            </div>
        </div>
    </div>

    <!-- مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyClNv4LaNoGWCVWzgEllo-9cZ1qvlBlEUU",
            authDomain: "quill-bot-screen-13ecb.firebaseapp.com",
            projectId: "quill-bot-screen-13ecb",
            storageBucket: "quill-bot-screen-13ecb.firebasestorage.app",
            messagingSenderId: "527652332387",
            appId: "1:527652332387:web:8ce6416e124e42929b2956"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // متغيرات التطبيق
        let screens = [];
        let selectedScreens = [];
        let selectedMedia = [];
        let selectedMediaIndex = -1;

        // عناصر الواجهة
        const selectedRobotsText = document.getElementById('selectedRobotsText');
        const mediaList = document.getElementById('mediaList');
        const previewArea = document.getElementById('previewArea');
        const mediaBox = document.getElementById('mediaBox');
        const imagePreview = document.getElementById('imagePreview');
        const videoPreview = document.getElementById('videoPreview');
        const urlPreview = document.getElementById('urlPreview');
        const emptyPreview = document.getElementById('emptyPreview');
        const durationSlider = document.getElementById('durationSlider');
        const durationLabel = document.getElementById('durationLabel');

        // ================== PWA Install Prompt ==================
        let deferredPrompt;
        const installModal = document.getElementById('installModal');
        const installAppBtn = document.getElementById('installAppBtn');
        const closeInstallBtn = document.getElementById('closeInstallBtn');
        const installMessage = document.getElementById('installMessage');

        // كشف نظام iOS
        const isIos = () => {
          const userAgent = window.navigator.userAgent.toLowerCase();
          return /iphone|ipad|ipod/.test(userAgent);
        };
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installMessage.innerText = "قم بتثبيت التطبيق على جهازك للوصول السريع وتجربة أفضل.";
            installAppBtn.style.display = 'block';
            
            if(!localStorage.getItem('installPromptClosed')) {
                installModal.style.display = 'flex';
            }
        });

        installAppBtn.addEventListener('click', async () => {
            installModal.style.display = 'none';
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            }
        });

        closeInstallBtn.addEventListener('click', () => {
            installModal.style.display = 'none';
            localStorage.setItem('installPromptClosed', 'true');
        });

        // ================== تهيئة التطبيق ==================
        document.addEventListener('DOMContentLoaded', () => {
            if (isIos() && !isInStandaloneMode() && !localStorage.getItem('installPromptClosed')) {
                installMessage.innerText = "لتثبيت التطبيق، اضغط على زر المشاركة بالأسفل ثم اختر 'إضافة إلى الصفحة الرئيسية' (Add to Home Screen).";
                installAppBtn.style.display = 'none';
                installModal.style.display = 'flex';
            }

            loadScreens();

            document.getElementById('refreshScreensBtn').onclick = loadScreens;
            document.getElementById('addMediaBtn').onclick = () => document.getElementById('fileInput').click();
            document.getElementById('fileInput').onchange = handleFileSelect;
            document.getElementById('addUrlDialogBtn').onclick = () => document.getElementById('urlModal').style.display = 'flex';
            document.getElementById('cancelUrlBtn').onclick = () => document.getElementById('urlModal').style.display = 'none';
            document.getElementById('addUrlBtn').onclick = handleAddUrl;
            document.getElementById('sendBtn').onclick = sendToScreens;
            
            durationSlider.oninput = (e) => {
                durationLabel.innerText = e.target.value + 's';
                if (selectedMediaIndex >= 0 && selectedMedia[selectedMediaIndex]) {
                    selectedMedia[selectedMediaIndex].durationSeconds = parseInt(e.target.value);
                }
            };
            
            setupLayoutEditor();
        });

        // ================== الروبوتات ==================
        function loadScreens() {
            selectedRobotsText.innerText = "جاري البحث...";
            db.collection("screens").get().then((snap) => {
                screens = [];
                snap.forEach((doc) => screens.push({ id: doc.id, name: doc.data().screenName || doc.id }));
                
                if (screens.length === 0) {
                    selectedRobotsText.innerText = "لا توجد شاشات مسجلة";
                } else {
                    selectedScreens = [screens[0]]; 
                    selectedRobotsText.innerText = screens.map(s => s.name).join(' · ');
                }
            }).catch(err => {
                selectedRobotsText.innerText = "خطأ في الاتصال";
                console.error(err);
            });
        }

        // ================== الوسائط والمقاطع ==================
        function handleFileSelect(e) {
            const files = e.target.files;
            for(let i=0; i<files.length; i++) {
                const file = files[i];
                const isVideo = file.type.startsWith('video/');
                selectedMedia.push({
                    file: file,
                    name: file.name,
                    mimeType: file.type,
                    mediaType: isVideo ? 'video' : 'image',
                    durationSeconds: isVideo ? 15 : 8,
                    url: URL.createObjectURL(file),
                    layoutX: 0.0, layoutY: 0.0, layoutW: 1.0, layoutH: 1.0
                });
            }
            selectedMediaIndex = selectedMedia.length - 1;
            refreshUI();
            e.target.value = ''; 
        }

        function handleAddUrl() {
            let url = document.getElementById('urlInput').value.trim();
            if(url) {
                if(!url.startsWith('http')) url = 'https://' + url;
                selectedMedia.push({
                    file: null,
                    name: "رابط ويب",
                    mimeType: "text/html",
                    mediaType: "url",
                    durationSeconds: 15,
                    url: url,
                    layoutX: 0.0, layoutY: 0.0, layoutW: 1.0, layoutH: 1.0
                });
                selectedMediaIndex = selectedMedia.length - 1;
                document.getElementById('urlModal').style.display = 'none';
                document.getElementById('urlInput').value = '';
                refreshUI();
            }
        }

        function refreshUI() {
            mediaList.innerHTML = '';
            selectedMedia.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'media-item' + (index === selectedMediaIndex ? ' active' : '');
                div.onclick = () => {
                    selectedMediaIndex = index;
                    refreshUI();
                };
                
                const thumb = document.createElement('div');
                thumb.className = 'media-thumb';
                if (item.mediaType === 'url') {
                    thumb.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>';
                }
                else if (item.mediaType === 'image') thumb.innerHTML = `<img src="${item.url}">`;
                else thumb.innerHTML = `<video src="${item.url}#t=1"></video>`;
                
                const info = document.createElement('div');
                info.className = 'media-info';
                info.innerHTML = `<div class="media-name">${item.name}</div><div class="media-type">${item.mediaType === 'url' ? 'رابط ويب' : (item.mediaType==='image'?'صورة':'فيديو')}</div>`;
                
                const actions = document.createElement('div');
                actions.className = 'media-actions';
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    selectedMedia.splice(index, 1);
                    if(selectedMediaIndex >= selectedMedia.length) selectedMediaIndex = selectedMedia.length - 1;
                    refreshUI();
                };
                actions.appendChild(delBtn);
                
                div.appendChild(thumb);
                div.appendChild(info);
                div.appendChild(actions);
                mediaList.appendChild(div);
            });
            
            refreshPreview();
        }

        function refreshPreview() {
            if (selectedMedia.length === 0 || selectedMediaIndex < 0) {
                mediaBox.style.display = 'none';
                emptyPreview.style.display = 'flex';
                videoPreview.pause();
                return;
            }
            
            const item = selectedMedia[selectedMediaIndex];
            mediaBox.style.display = 'block';
            emptyPreview.style.display = 'none';
            
            const pw = previewArea.clientWidth;
            const ph = previewArea.clientHeight;
            mediaBox.style.left = (item.layoutX * pw) + 'px';
            mediaBox.style.top = (item.layoutY * ph) + 'px';
            mediaBox.style.width = (item.layoutW * pw) + 'px';
            mediaBox.style.height = (item.layoutH * ph) + 'px';
            
            imagePreview.style.display = 'none';
            videoPreview.style.display = 'none';
            urlPreview.style.display = 'none';
            videoPreview.pause();
            
            if (item.mediaType === 'url') {
                urlPreview.style.display = 'flex';
            } else if (item.mediaType === 'image') {
                imagePreview.style.display = 'block';
                imagePreview.src = item.url;
            } else {
                videoPreview.style.display = 'block';
                videoPreview.src = item.url;
                videoPreview.play();
            }
            
            durationSlider.value = item.durationSeconds;
            durationLabel.innerText = item.durationSeconds + 's';
        }

        // ================== محرر الأبعاد ==================
        function setupLayoutEditor() {
            const handle = document.getElementById('resizeHandle');
            let isDragging = false, isResizing = false;
            let startX, startY, startLeft, startTop, startWidth, startHeight;
            const getEvt = e => e.touches ? e.touches[0] : e;
            
            handle.addEventListener('mousedown', startResize);
            handle.addEventListener('touchstart', startResize, {passive: false});
            
            function startResize(e) {
                e.preventDefault(); e.stopPropagation();
                isResizing = true;
                const evt = getEvt(e);
                startX = evt.clientX; startY = evt.clientY;
                startWidth = mediaBox.offsetWidth; startHeight = mediaBox.offsetHeight;
                document.addEventListener('mousemove', doResize);
                document.addEventListener('mouseup', stopAction);
                document.addEventListener('touchmove', doResize, {passive: false});
                document.addEventListener('touchend', stopAction);
            }
            
            function doResize(e) {
                if (!isResizing) return;
                e.preventDefault();
                const evt = getEvt(e);
                let newWidth = startWidth + (evt.clientX - startX);
                let newHeight = startHeight + (evt.clientY - startY);
                
                const pw = previewArea.clientWidth; const ph = previewArea.clientHeight;
                const left = mediaBox.offsetLeft; const top = mediaBox.offsetTop;
                if(newWidth + left > pw) newWidth = pw - left;
                if(newHeight + top > ph) newHeight = ph - top;
                if(newWidth < 40) newWidth = 40;
                if(newHeight < 40) newHeight = 40;
                
                mediaBox.style.width = newWidth + 'px';
                mediaBox.style.height = newHeight + 'px';
                saveLayout();
            }
            
            mediaBox.addEventListener('mousedown', startDrag);
            mediaBox.addEventListener('touchstart', startDrag, {passive: false});
            
            function startDrag(e) {
                if(e.target === handle) return;
                e.preventDefault();
                isDragging = true;
                const evt = getEvt(e);
                startX = evt.clientX; startY = evt.clientY;
                startLeft = mediaBox.offsetLeft; startTop = mediaBox.offsetTop;
                document.addEventListener('mousemove', doDrag);
                document.addEventListener('mouseup', stopAction);
                document.addEventListener('touchmove', doDrag, {passive: false});
                document.addEventListener('touchend', stopAction);
            }
            
            function doDrag(e) {
                if (!isDragging) return;
                e.preventDefault();
                const evt = getEvt(e);
                let newLeft = startLeft + (evt.clientX - startX);
                let newTop = startTop + (evt.clientY - startY);
                
                const pw = previewArea.clientWidth; const ph = previewArea.clientHeight;
                const w = mediaBox.offsetWidth; const h = mediaBox.offsetHeight;
                if(newLeft < 0) newLeft = 0; if(newTop < 0) newTop = 0;
                if(newLeft + w > pw) newLeft = pw - w;
                if(newTop + h > ph) newTop = ph - h;
                
                mediaBox.style.left = newLeft + 'px';
                mediaBox.style.top = newTop + 'px';
                saveLayout();
            }
            
            function stopAction() {
                isDragging = false; isResizing = false;
                document.removeEventListener('mousemove', doDrag);
                document.removeEventListener('mousemove', doResize);
                document.removeEventListener('mouseup', stopAction);
                document.removeEventListener('touchmove', doDrag);
                document.removeEventListener('touchmove', doResize);
                document.removeEventListener('touchend', stopAction);
            }
            
            function saveLayout() {
                if(selectedMediaIndex >= 0) {
                    const item = selectedMedia[selectedMediaIndex];
                    const pw = previewArea.clientWidth; const ph = previewArea.clientHeight;
                    item.layoutX = mediaBox.offsetLeft / pw;
                    item.layoutY = mediaBox.offsetTop / ph;
                    item.layoutW = mediaBox.offsetWidth / pw;
                    item.layoutH = mediaBox.offsetHeight / ph;
                }
            }
        }

        // ================== الإرسال إلى الشاشات ==================
        async function sendToScreens() {
            if (selectedScreens.length === 0) return alert("الرجاء اختيار روبوت أولاً");
            if (selectedMedia.length === 0) return alert("قم بإضافة وسائط للإرسال");

            const overlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            overlay.style.display = 'flex';
            
            const batchId = Date.now().toString();
            const batchTotal = selectedMedia.length;
            let done = 0;
            
            loadingText.innerText = `0 / ${batchTotal} جاري المعالجة`;

            try {
                for (let s of selectedScreens) {
                    for (let i = 0; i < selectedMedia.length; i++) {
                        const item = selectedMedia[i];
                        const cid = db.collection('screen_content').doc().id;
                        
                        if (item.mediaType === 'url') {
                            await db.collection("screen_content").doc(cid).set({
                                screenId: s.id,
                                storagePath: "",
                                mediaType: "url",
                                senderName: "Web App",
                                status: "pending",
                                originalFileName: item.name,
                                durationSeconds: item.durationSeconds,
                                batchId: batchId,
                                batchOrder: i,
                                batchTotal: batchTotal,
                                replacePlaylist: true,
                                createdAtDeviceTime: Date.now(),
                                layoutX: item.layoutX, layoutY: item.layoutY,
                                layoutW: item.layoutW, layoutH: item.layoutH,
                                url: item.url
                            });
                        } else {
                            const ext = item.name.split('.').pop();
                            const path = `uploads/${s.id}/${cid}.${ext}`;
                            const ref = storage.ref().child(path);
                            
                            const meta = { contentType: item.mimeType || (item.mediaType === 'image'?'image/jpeg':'video/mp4') };
                            await ref.put(item.file, meta);
                            
                            await db.collection("screen_content").doc(cid).set({
                                screenId: s.id,
                                storagePath: path,
                                mediaType: item.mediaType,
                                senderName: "Web App",
                                status: "pending",
                                originalFileName: item.name,
                                durationSeconds: item.durationSeconds,
                                batchId: batchId,
                                batchOrder: i,
                                batchTotal: batchTotal,
                                replacePlaylist: true,
                                createdAtDeviceTime: Date.now(),
                                layoutX: item.layoutX, layoutY: item.layoutY,
                                layoutW: item.layoutW, layoutH: item.layoutH
                            });
                        }
                        
                        done++;
                        loadingText.innerText = `${done} / ${batchTotal * selectedScreens.length} تم الإرسال`;
                    }
                }
                
                alert("تم إرسال الملفات بنجاح! 🚀");
                selectedMedia = [];
                selectedMediaIndex = -1;
                refreshUI();
                
            } catch (e) {
                console.error(e);
                alert("حدث خطأ أثناء الرفع: " + e.message);
            } finally {
                overlay.style.display = 'none';
            }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
