<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق الإرسال Quill</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#070C10">
    <link rel="icon" href="https://uploads.onecompiler.io/44krdug5q/1781421056101/Quillbot.jpg">
</head>
<body>
    <div id="app">
        <!-- شريط الروبوتات -->
        <header class="header">
            <div class="robots-info">
                <span class="icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                </span>
                <div class="text">
                    <div class="label">الروبوتات المحددة</div>
                    <div id="selectedRobotsText" class="value">جاري البحث...</div>
                </div>
            </div>
            <button id="refreshScreensBtn" class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-10.09l5.67-5.67"/></svg>
            </button>
        </header>

        <!-- منطقة المعاينة وتعديل الأبعاد -->
        <div class="preview-area" id="previewArea">
            <div id="mediaBox" class="media-box" style="display: none;">
                <img id="imagePreview" style="display: none;" draggable="false" />
                <video id="videoPreview" loop muted style="display: none;"></video>
                <div id="urlPreview" style="display: none;" class="url-placeholder">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:8px;"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    رابط ويب
                </div>
                <div class="resize-handle" id="resizeHandle"></div>
            </div>
            <div id="emptyPreview" class="empty-preview">
                لا توجد وسائط محددة
            </div>
        </div>

        <!-- مدة العرض -->
        <div class="duration-control">
            <div class="duration-header">
                <span>مدة العرض:</span>
                <span id="durationLabel" class="duration-value">15s</span>
            </div>
            <input type="range" id="durationSlider" min="1" max="60" value="15">
        </div>

        <!-- أزرار التحكم بالقائمة -->
        <div class="controls-bar">
            <button id="addMediaBtn" class="add-btn" title="إضافة وسائط">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;" multiple>
            <button id="addUrlDialogBtn" class="add-btn" title="إضافة رابط">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            </button>
            <button id="sendBtn" class="send-btn">
                إرسال للشاشة
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px; vertical-align:middle;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>

        <!-- قائمة الوسائط المحددة -->
        <div class="media-list" id="mediaList">
            <!-- سيتم إضافة العناصر هنا عبر الجافاسكريبت -->
        </div>

        <!-- طبقة التحميل -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loader"></div>
            <div id="loadingText">جاري المعالجة...</div>
        </div>
        
        <!-- نافذة إضافة رابط -->
        <div id="urlModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>إضافة رابط ويب</h3>
                <input type="url" id="urlInput" placeholder="https://..." dir="ltr">
                <div class="modal-actions">
                    <button id="cancelUrlBtn" class="btn-secondary">إلغاء</button>
                    <button id="addUrlBtn" class="btn-primary">إضافة</button>
                </div>
            </div>
        </div>

        <!-- نافذة تثبيت التطبيق -->
        <div id="installModal" class="modal" style="display: none;">
            <div class="modal-content text-center">
                <img src="https://uploads.onecompiler.io/44krdug5q/1781421056101/Quillbot.jpg" alt="Icon" class="install-icon">
                <h3 id="installTitle">تثبيت التطبيق</h3>
                <p id="installMessage" style="margin-bottom:20px; line-height:1.6; color:#8899A6;">قم بتثبيت التطبيق على جهازك للوصول السريع وتجربة أفضل.</p>
                <div class="modal-actions">
                    <button id="closeInstallBtn" class="btn-secondary">لاحقاً</button>
                    <button id="installAppBtn" class="btn-primary">تثبيت الآن</button>
                </div>
            </div>
        </div>
    </div>

    <!-- مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
